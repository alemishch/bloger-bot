x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-bloger_bot}
  POSTGRES_USER: ${POSTGRES_USER:-bloger_bot}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
  CHROMA_HOST: chromadb
  CHROMA_PORT: "8000"
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-DEBUG}

x-worker-env: &worker-env
  <<: *common-env
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
  TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
  TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
  TELEGRAM_SESSION_NAME: ${TELEGRAM_SESSION_NAME:-content_parser}
  SESSIONS_DIR: /app/sessions
  AUDIO_DIR: /app/data/audio

x-worker-volumes: &worker-volumes
  - ./data:/app/data
  - ./sessions:/app/sessions
  - ./services/ingestion-service/src:/app/src

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bloger_bot}
      POSTGRES_USER: ${POSTGRES_USER:-bloger_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bloger_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    environment:
      <<: *worker-env
    ports:
      - "${INGESTION_SERVICE_PORT:-8002}:8000"
    volumes: *worker-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # concurrency=2: parse tasks, label, vectorize
  ingestion-worker:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    command: celery -A ingestion_service.workers.celery_app worker --loglevel=info --concurrency=2 --queues=default --hostname=parse-worker@%h
    environment:
      <<: *worker-env
    volumes: *worker-volumes
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # concurrency=1: one Pyrogram client, sequential downloads
  ingestion-download-worker:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    command: celery -A ingestion_service.workers.celery_app worker --loglevel=info --concurrency=1 --queues=downloads --hostname=download-worker@%h
    environment:
      <<: *worker-env
    volumes: *worker-volumes
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # concurrency=3: convert+transcribe (mostly waiting on OpenAI API)
  ingestion-transcription-worker:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    command: celery -A ingestion_service.workers.celery_app worker --loglevel=info --concurrency=3 --queues=transcriptions --hostname=transcription-worker@%h
    environment:
      <<: *worker-env
    volumes: *worker-volumes
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── User Service ──
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${USER_SERVICE_PORT:-8004}:8000"
    volumes:
      - ./services/user-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  # ── LLM Service ──
  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      BLOGGER_ID: ${BLOGGER_ID:-yuri}
    ports:
      - "${LLM_SERVICE_PORT:-8003}:8000"
    volumes:
      - ./services/llm-service/src:/app/src
      - ./config:/app/config
    depends_on:
      - chromadb

  # ── Telegram Bot (Yuri) ──
  telegram-bot-yuri:
    build:
      context: .
      dockerfile: services/telegram-bot/Dockerfile
    environment:
      BLOGGER_ID: yuri
      TELEGRAM_BOT_TOKEN_YURI: ${TELEGRAM_BOT_TOKEN_YURI:-}
      LLM_SERVICE_URL: http://llm-service:8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./services/telegram-bot/src:/app/src
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      llm-service:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  prometheus_data:
  grafana_data: